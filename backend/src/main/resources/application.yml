spring:
  application:
    name: tutorias-intersedes-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tutorias_intersedes}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

jwt:
  secret-key: ${JWT_SECRET:change-this-secret-in-local-env}

server:
  port: ${SERVER_PORT:8080}
